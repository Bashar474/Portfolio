  <main>
    <div class="form-container">
      <h2>Neem contact met mij op</h2>
      <form action="#" method="post">
        <label for="voornaam">Voornaam:</label>
        <input type="text" id="voornaam" name="voornaam" placeholder="Vul hier uw voornaam in!" pattern="[A-Za-zÀ-ÿ\s]+"
          required>

        <label for="achternaam">Achternaam:</label>
        <input type="text" id="achternaam" name="achternaam" placeholder="Vul hier uw achternaam in!"
          pattern="[A-Za-zÀ-ÿ\s]+" required>

        <label for="telefoon">Telefoon:</label>
        <input type="tel" id="telefoon" name="telefoon" placeholder="Vul hier uw telefoon in!" pattern="[0-9]{10}"
          maxlength="10" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Vul hier uw e-mail adres in!"
          pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" required>

        <label for="onderwerp">Onderwerp:</label>
        <select id="onderwerp" name="onderwerp" required>
          <option value="" disabled selected hidden>Kies een onderwerp</option>
          <option value="vraag">Vraag</option>
          <option value="feedback">Feedback</option>
          <option value="afspraak">Afspraak</option>
        </select>

        <label for="bericht">Bericht:</label>
        <textarea id="bericht" name="bericht" rows="5" placeholder="Vul hier uw bericht in!" required></textarea>

        <input type="submit" value="Verzenden">
      </form>
    </div>
  </main>
